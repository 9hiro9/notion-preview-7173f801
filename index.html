body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif; background: #f8fafc; color: #0f172a; }

.app { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

.header h1 { font-size: 1.5rem; margin: 0; }

.tabs { display: flex; gap: .25rem; background: #e2e8f0; padding: .25rem; border-radius: .75rem; }
.tab { padding: .5rem 1rem; border: none; background: transparent; color: #475569; cursor: pointer; border-radius: .5rem; font-size: .875rem; font-weight: 500; transition: all .2s; }
.tab:hover { color: #0f172a; }
.tab.active { background: #fff; color: #0f172a; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: .75rem; margin-bottom: 1.25rem; }
.stat-card { background: #fff; padding: 1rem; border-radius: .75rem; border: 1px solid #e2e8f0; }
.stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1.2; }
.stat-label { font-size: .75rem; color: #64748b; margin-top: .25rem; }
.stat-card.tone-pending .stat-value { color: #ea580c; }
.stat-card.tone-approved .stat-value { color: #16a34a; }
.stat-card.tone-rejected .stat-value { color: #64748b; }

.controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: .75rem; flex-wrap: wrap; }
.filters { display: flex; gap: .5rem; }
.filters select { padding: .5rem .75rem; border: 1px solid #cbd5e1; border-radius: .5rem; background: #fff; font-size: .875rem; cursor: pointer; }
.btn-refresh { padding: .5rem 1rem; border: 1px solid #cbd5e1; background: #fff; border-radius: .5rem; cursor: pointer; font-size: .875rem; }
.btn-refresh:hover:not(:disabled) { background: #f1f5f9; }
.btn-refresh:disabled { opacity: .5; cursor: not-allowed; }

.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: .75rem; }
.card { background: #fff; padding: 1rem; border-radius: .75rem; border: 1px solid #e2e8f0; transition: transform .15s, box-shadow .15s; }

.card-head { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; flex-wrap: wrap; }
.name { font-weight: 600; font-size: 1rem; }
.dept { font-size: .75rem; color: #64748b; background: #f1f5f9; padding: .125rem .5rem; border-radius: .375rem; }
.badge { margin-left: auto; font-size: .75rem; font-weight: 600; padding: .25rem .625rem; border-radius: 9999px; }
.badge.status-pending { background: #fed7aa; color: #9a3412; }
.badge.status-approved { background: #bbf7d0; color: #14532d; }
.badge.status-rejected { background: #e2e8f0; color: #475569; }
.card-body { font-size: .875rem; color: #334155; display: flex; flex-direction: column; gap: .25rem; }
.card-body .type { font-weight: 500; }
.card-body .date { color: #64748b; }
.card-body .reason { color: #475569; font-size: .8125rem; padding-top: .25rem; border-top: 1px dashed #e2e8f0; margin-top: .25rem; }

.empty { grid-column: 1 / -1; text-align: center; padding: 3rem; color: #94a3b8; background: #fff; border-radius: .75rem; border: 1px dashed #cbd5e1; }

.error-banner { display: flex; align-items: center; gap: .75rem; padding: .875rem 1rem; background: #fef2f2; border: 1px solid #fca5a5; border-radius: .5rem; margin-bottom: 1rem; font-size: .875rem; color: #991b1b; flex-wrap: wrap; }
.error-banner strong { flex-shrink: 0; }
.error-banner span { flex: 1; min-width: 200px; }
.error-banner .btn-secondary { flex-shrink: 0; }

.skeleton { height: 120px; background: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border: none; }
.skeleton:hover { transform: none; box-shadow: none; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.form { background: #fff; padding: 1.5rem; border-radius: .75rem; border: 1px solid #e2e8f0; max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: .875rem; }
.form h2 { margin: 0 0 .5rem 0; font-size: 1.25rem; }
.form label { display: flex; flex-direction: column; gap: .375rem; font-size: .875rem; font-weight: 500; color: #334155; }
.form input, .form select, .form textarea { padding: .625rem .75rem; border: 1px solid #cbd5e1; border-radius: .5rem; font-size: .875rem; font-family: inherit; background: #fff; }
.form input:focus, .form select:focus, .form textarea:focus { outline: 2px solid #6366f1; outline-offset: -1px; border-color: #6366f1; }
.form textarea { resize: vertical; min-height: 80px; }
.form .row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

.actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: .5rem; }
.btn-primary { padding: .625rem 1.25rem; background: #6366f1; color: #fff; border: none; border-radius: .5rem; font-weight: 600; cursor: pointer; font-size: .875rem; }
.btn-primary:hover:not(:disabled) { background: #4f46e5; }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; }
.btn-secondary { padding: .625rem 1.25rem; background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; border-radius: .5rem; font-weight: 500; cursor: pointer; font-size: .875rem; }
.btn-secondary:hover { background: #e2e8f0; }

.message { padding: .75rem 1rem; border-radius: .5rem; font-size: .875rem; }
.message.success { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
.message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

@media (max-width: 640px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .form .row { grid-template-columns: 1fr; }
}
